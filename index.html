<!DOCTYPE html>
<html>

<head>
    <title>Dashboard Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="sidebar">
            <h2>PYU</h2>
            <p>Dashboard</p>
            <p>Sinh viên</p>
            <p>Lớp học</p>
            <p>Điểm danh</p>
        </div>

        <div class="main">

            <div class="header">
                <h2>Tổng quan</h2>
                <p>Admin</p>
            </div>

            <div class="cards">
                <div class="card">1200 SV</div>
                <div class="card">48 Lớp</div>
                <div class="card">92.5%</div>
                <div class="card">64 GV</div>
            </div>

            <div class="student">
                <input type="text" placeholder="Tìm kiếm">

                <table>
                    <tr>
                        <th>MSSV</th>
                        <th>Họ tên</th>
                        <th>Lớp</th>
                    </tr>

                    <tr>
                        <td>SV001</td>
                        <td>Nguyễn Văn A</td>
                        <td>CNTT1</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
